<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting…</title>
  <meta http-equiv="refresh" content="0; url=https://maxsutter.de/">
  <link rel="canonical" href="https://maxsutter.de/">
  <meta name="robots" content="noindex">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function() {
      var target = 'https://maxsutter.de/';
      if (window.location.replace) {
        window.location.replace(target);
      } else {
        window.location.href = target;
      }
    })();
  </script>
  <style>
    body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;color:#111;background:#fff}
    a{color:#06f}
  </style>
</head>
<body>
  <p>Redirecting to <a href="https://maxsutter.de/">maxsutter.de</a>…</p>
</body>
</html>
